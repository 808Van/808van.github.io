<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Van G. Adams | Protocol Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --tceq-blue: #003366; 
            --neon-blue: #00d2ff;
            --polo-red: #cc0000;
            --minecraft-green: #55ff55;
            --dark-bg: #05050a;
            --card-bg: #101018;
        }

        body {
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* Navigation Tabs */
        nav {
            display: flex;
            background: var(--card-bg);
            width: 100%;
            justify-content: center;
            border-bottom: 2px solid var(--tceq-blue);
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .tab-btn {
            padding: 15px 20px;
            color: #888;
            cursor: pointer;
            border: none;
            background: none;
            font-family: 'Orbitron', sans-serif;
            font-size: 12px;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .tab-btn.active {
            color: var(--neon-blue);
            border-bottom: 3px solid var(--neon-blue);
            text-shadow: 0 0 10px var(--neon-blue);
        }

        /* Content Sections */
        .section { display: none; width: 90%; max-width: 500px; padding: 20px; animation: fadeIn 0.5s; }
        .section.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Gamer Card Styles */
        .card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            border: 1px solid var(--tceq-blue);
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.15);
            position: relative;
        }

        .profile-pic { 
            width: 160px; 
            height: 160px; 
            border-radius: 50%; 
            border: 4px solid var(--polo-red); 
            object-fit: cover;
            margin-bottom: 15px;
            box-shadow: 0 0 15px rgba(204, 0, 0, 0.3);
        }

        .status-dot {
            height: 12px;
            width: 12px;
            background-color: var(--minecraft-green);
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            box-shadow: 0 0 8px var(--minecraft-green);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        /* ID List Box */
        .id-box {
            margin-top: 20px;
            text-align: left;
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 12px;
            font-family: 'Roboto Mono', monospace;
            border: 1px solid #333;
        }

        .id-box p { margin: 8px 0; font-size: 14px; }

        /* Photo Gallery */
        .gallery {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 20px;
        }
        .gallery img { 
            width: 100%; 
            height: 150px;
            border-radius: 12px; 
            border: 1px solid #333; 
            object-fit: cover;
            transition: 0.3s;
        }
